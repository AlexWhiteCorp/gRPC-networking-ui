name: Create release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create_release:
    name: Create Release
    # Intel macOS runner: builds the macOS .dmg (arm64 + x64) and — via the Wine
    # binary electron-builder downloads automatically — the Windows .exe, all in
    # one job. (Wine 4.0.1 is x64, so it needs an Intel runner, not arm64.)
    runs-on: macos-13
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Get release version
        id: release-version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Build app bundles (main + preload + renderer)
        run: npm run build

      - name: Package macOS (.dmg, arm64 + x64)
        run: npx electron-builder --mac --arm64 --x64 --publish never

      - name: Package Windows (.exe, x64)
        run: npx electron-builder --win --publish never

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.release-version.outputs.version }}
          tag_name: v${{ steps.release-version.outputs.version }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          token: ${{ secrets.GH_ACTIONS_TOKEN }}
          # electron-builder writes installers to release/ (see electron-builder.yml).
          files: |
            release/*.dmg
            release/*.exe
